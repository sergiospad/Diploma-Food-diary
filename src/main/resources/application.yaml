logging:
  level:
    root: info
    org.springframework.jdbc.core: trace

spring:
  liquibase:
    clear-checksums: true
  datasource:
    url: jdbc:postgresql://localhost:5433/food-diary
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    properties.hibernate:
      show_sql: true
      format_sql: true
      hbm2ddl:
        auto: create
      default_batch_fetch_size: 50
      open-in-view: false
      servlet.multipart:
        enabled: true
        max-file-size: 10MB
        max-request-size: 10MB
  application:
    name: diploma-food-diary

app:
