<div class="add-activity">
  <h3 class="add-activity__title">Добавить спортивную активность</h3>

  <form [formGroup]="activityForm" class="add-activity__form" (ngSubmit)="submitForm()">
    <mat-form-field appearance="outline" subscriptSizing="fixed" class="add-activity__field">
      <mat-label>Название активности</mat-label>
      <input matInput type="text" formControlName="activityName" />
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="fixed" class="add-activity__field">
      <mat-label>Затраченные калории</mat-label>
      <input
        matInput
        type="number"
        formControlName="calories"
        min="1"
        max="5000"
        step="1" />
    </mat-form-field>

    <div class="add-activity__actions">
      <button type="submit" [disabled]="activityForm.invalid">Подтвердить</button>
    </div>
  </form>
</div>
