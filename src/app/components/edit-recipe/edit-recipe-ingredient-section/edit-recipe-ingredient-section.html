<div class="blocks__ingredients">
  <span class="blocks__ingredients__heading">Параметры и ингредиенты</span>
  <div class="blocks__ingredients__private">
    <input
      class="checkbox"
      type="checkbox"
      id="add-recipe-is-private"
      [checked]="isPrivate()"
      (change)="changeIsPrivate($any($event.target).checked)"/>
    <label class="blocks__ingredients__label" for="add-recipe-is-private">Приватный рецепт</label>
  </div>

  <div class="blocks__ingredients__time">
    <div class="blocks__ingredients__time__checkbox">
      <input
        class="checkbox"
        type="checkbox"
        id="add-recipe-needs-time"
        [checked]="needsCookingTime()"
        (change)="onNeedsCookingTime($any($event.target).checked)"/>
      <label class="blocks__ingredients__label" for="add-recipe-needs-time">Добавить время приготовления</label>
    </div>
    @if (needsCookingTime()) {
      <div class="blocks__ingredients__time__num-input">
        <label class="blocks__ingredients__label" for="add-recipe-cooking-time">Время приготовления</label>
        <input
          id="add-recipe-cooking-time"
          type="number"
          min="5"
          max="500"
          step="5"
          [value]="recipe().cookingTime"
          (input)="onCookingTimeInput($event)"
          (blur)="onCookingTimeBlur($event)"/>
        мин.
      </div>
    }
  </div>
  <div class="blocks__ingredients__new-product">
    <button mat-flat-button class="blocks__ingredients__edit-recipe__button" (click)="openAddProductDialog()">
      Добавить новый продукт
    </button>
  </div>
  <app-edit-recipe-ingredients-show [(recipe)]="recipe"
                                    [(recipeEdit)]="recipeEdit">
  </app-edit-recipe-ingredients-show>
</div>
