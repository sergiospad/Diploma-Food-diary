<div class="container">
  <h1 class="new-recipe">Редактирование рецепта</h1>
  <div class="blocks">
    <app-edit-recipe-main-info-section [(recipe)]="recipe"
                                       [(recipeEdit)]="recipeEdit">
    </app-edit-recipe-main-info-section>

    <app-edit-recipe-ingredient-section  [(recipe)]="recipe"
                                         [(recipeEdit)]="recipeEdit">
    </app-edit-recipe-ingredient-section>
  </div>
  <div class="divider"></div>
  <div class="cooking-stages">
    <app-edit-recipe-cooking-stages [(recipe)]="recipe"
                                    [(recipeEdit)]="recipeEdit">
    </app-edit-recipe-cooking-stages>
  </div>
  <div class="divider"></div>
  <app-edit-tags [(recipe)]="recipe"
                 [(recipeEdit)]="recipeEdit">
  </app-edit-tags>
  <div class="divider"></div>
  <div class="submit-button">
    <button
      mat-flat-button
      class="submit__active__button"
      (click)="saveRecipe()">
      Подтвердить
    </button>
    <button
      mat-flat-button
      class="submit__active__button"
      (click)="cancel()">
      Отмена
    </button>
  </div>

</div>
