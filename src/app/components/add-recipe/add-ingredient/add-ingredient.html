<form [formGroup]="ingredientForm">
  <div class="new-ingredient">
    <mat-form-field class = "new-ingredient__name" appearance="outline">
      <mat-label>Название продукта</mat-label>
      <input
        matInput
        [formControl]="productSearchControl"
        [matAutocomplete]="productSearchAuto"
        (input)="onProductQueryInput()">
      <mat-autocomplete [displayWith] ="displayProductName"
        #productSearchAuto="matAutocomplete"
                        (optionSelected)="onMeasureUnitSearchSelect($event.option.value)">
        @if (isProductSearchLoading) {
          <mat-option disabled>Поиск...</mat-option>
        }
        @for (item of (searchProductResults$ | async); track item.id) {
          <mat-option [value]="item">
            {{ item.name }}
          </mat-option>
        }
        @if (ingredientForm.get('productID')?.hasError('required')) {
          <mat-error>Выберите продукт</mat-error>
        }
      </mat-autocomplete>
    </mat-form-field>
    <div class = "new-ingredient__amount-and-mu">
      <mat-form-field class="new-ingredient__amount" appearance="outline">
        <mat-label>Количество</mat-label>
        <input matInput formControlName="amount"/>
      </mat-form-field>

      <div class="new-ingredient__mu">
        <ng-select
          [items]="searchMeasureUnitResults ?? []"
          bindLabel="name"
          bindValue="id"
          placeholder="ед. изм."
          appendTo="body"
          [multiple]="false"
          [clearable]="false"
          [disabled]="!chosenProduct"
          formControlName="measureUnitID">
        </ng-select>
      </div>
    </div>
  </div>
  <div >
    <button class = "new-ingredient__button"
            type="button"
            mat-flat-button
            (click)="addToNewProductCard()">
      Добавить новый продукт
    </button>
  </div>


</form>
