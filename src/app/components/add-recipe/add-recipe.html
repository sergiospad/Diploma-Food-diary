<div class="container">
  <h1 class="new-recipe">Новый рецепт</h1>
  <div class="blocks">
    <app-recipe-main-info-section (toMainComponentTitle)="title = $event"
                                  (toMainComponentSummary)="summary = $event"
                                  (toMainComponentTitleImageBlob)="titleImageBlob = $event"
    ></app-recipe-main-info-section>

   <app-recipe-main-info-ingredients-section (toMainComponentCookingTime)="cookingTime = $event"
                                             (toMainComponentIsPrivate)="isPrivate = $event"
                                             [ingredients]="ingredients">
   </app-recipe-main-info-ingredients-section>
  </div>
  <div class="divider"></div>
  <div class="cooking-stages">
    <app-cooking-stage-section [cookingStages]="cookingStages??[]">
    </app-cooking-stage-section>
  </div>
  <div class="divider"></div>
  <div class="tags">
    <mat-form-field appearance="outline" class="tags__list">
      <mat-label>Теги</mat-label>
      <mat-select
        name="recipeTags"
        placeholder="Выберите теги"
        multiple
        [(ngModel)]="selectedTags">
        @for (tag of allTags ?? []; track tag.id) {
          <mat-option [value]="tag">{{ tag.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
    @for (tag of selectedTags; track tag.id){
      <div class = "tags__chip">{{tag.name}}</div>
    }
  </div>
  <div class="divider"></div>
  <div class="submit-button">
    <button
      mat-flat-button
      class="submit__active__button"
      [disabled]="!canSubmit()"
      (click)="saveRecipe()">
      Добавить новый рецепт
    </button>
  </div>

</div>
