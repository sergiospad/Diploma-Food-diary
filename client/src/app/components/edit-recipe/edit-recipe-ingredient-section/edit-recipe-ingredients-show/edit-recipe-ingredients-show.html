<div class= "ingredients__heading__container">
  <span class="blocks__ingredients__heading">Ингредиенты</span>
</div>
@for (ing of recipe().ingredients; track $index) {
  @if(indexToEdit()===$index){
    <app-edit-ingredient [ingredient]="ing"
                         (toMainComponentIngredientChange)="onIngredientChanged($event)">
    </app-edit-ingredient>
  }
  @else {
  <div class="ingredient-line">
    <span class="ingredient-line__name">{{ ing.productName }}</span>
    <span class="ingredient-line__leader" aria-hidden="true"></span>
    <span class="ingredient-line__meta">
      {{ ing.amount | number:'1.0-1'}} {{ ing.units[0].name }}
    </span>
    <button
      type="button"
      mat-icon-button
      class="ingredient-line__remove"
      (click)="removeIngredient($index)"
      [attr.aria-label]="'Удалить: ' + ing.productName">
      <mat-icon>close</mat-icon>
    </button>
    <button
      type="button"
      mat-icon-button
      class="ingredient-line__remove"
      (click)="editIngredient($index)"
      [attr.aria-label]="'Удалить: ' + ing.productName">
      <mat-icon>edit</mat-icon>
    </button>
  </div>
  }
}
